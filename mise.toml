[tools]
go = "1.26.5"
golangci-lint = "latest"

[tasks.vet]
description = "Run go vet"
run = "go vet ./..."

[tasks.build]
description = "Build the binary"
run = "go build ./..."

[tasks.test]
description = "Run tests with race detector and coverage"
run = "go test ./... -race -cover"

[tasks.lint]
description = "Lint Go source files"
run = "golangci-lint run ./..."
